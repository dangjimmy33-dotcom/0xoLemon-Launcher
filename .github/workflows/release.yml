name: Release 0xoLemon

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build signed Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches application version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          $config = Get-Content -Raw -Encoding utf8 src-tauri/tauri.conf.json | ConvertFrom-Json
          if ($config.version -ne $tagVersion) {
            throw "Tag version $tagVersion does not match tauri.conf.json version $($config.version)"
          }

      - name: Build, sign, and publish release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          OXO_DISCORD_CLIENT_ID: ${{ vars.OXO_DISCORD_CLIENT_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '0xoLemon ${{ github.ref_name }}'
          releaseBody: |
            Signed 0xoLemon launcher release.

            The release includes the Windows installer and `latest.json` manifest used by the in-app updater.
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: --target x86_64-pc-windows-msvc
