name: "Migrate GSE PR"

on:
  pull_request:
    branches: ["dev"]
    paths:
      - "!**/*.md"
      - "tools/migrate_gse/**"

permissions:
  contents: "write"

jobs:
  script-win:
    name: "Migrate GSE win"
    if: ${{ !cancelled() }}
    uses: "./.github/workflows/migrate_gse-build-win.yml"

  script-win-vs22:
    name: "Migrate GSE win vs22"
    if: ${{ !cancelled() }}
    uses: "./.github/workflows/migrate_gse-build-win-vs22.yml"


  script-linux:
    name: "Migrate GSE linux"
    if: ${{ !cancelled() }}
    uses: "./.github/workflows/migrate_gse-build-linux.yml"
