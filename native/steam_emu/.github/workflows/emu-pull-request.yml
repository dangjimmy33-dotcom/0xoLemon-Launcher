name: "Emu PR"

on:
  pull_request:
    branches: ["dev"]
    paths-ignore:
      - "**/*.md"
      - "dev.notes/**"
      - "post_build/**"
      - "z_original_repo_files/**"
      - "sdk/*.txt"
      - "LICENSE"
      # tools
      - "tools/generate_emu_config/**"
      - "tools/migrate_gse/**"
      - "tools/steamclient_loader/linux/**" # these are just scripts, not built

permissions:
  contents: "write"

jobs:
  emu-win-all:
    name: "win"
    if: ${{ !cancelled() }}
    uses: "./.github/workflows/emu-build-all-win.yml"

  emu-win-all-vs22:
    name: "win vs22"
    if: ${{ !cancelled() }}
    uses: "./.github/workflows/emu-build-all-win-vs22.yml"

  emu-linux-all:
    name: "linux"
    if: ${{ !cancelled() }}
    uses: "./.github/workflows/emu-build-all-linux.yml"
