name: Cross compile to windows from Linux

# There's || being used here and there because on github actions
# it thinks those are fatal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
      - name: Install base dependencies
        run: |
          pacman -Syu --noconfirm archlinux-keyring
          pacman -Syu --noconfirm base-devel sudo git clang lld make cmake extra-cmake-modules python wine wine-mono msitools ca-certificates libwbclient 7zip

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Fix permissions
        run: chown -R builder:builder .

      - name: Build
        run: |
          sudo -u builder sh <<'EOF'
          set -ex
          trap 'echo "FAILED at line $LINENO (exit $?)" >&2' ERR
          export WINE=$(command -v wine64 || command -v wine || false)
          export WINDOWS_SDK_PATH="/opt/msvc"
          export PATH=$WINDOWS_SDK_PATH/bin/x86:$PATH
          export XDG_RUNTIME_DIR=/build/xdg
          sudo mkdir -p $WINDOWS_SDK_PATH $WINDOWS_SDK_PATH
          $WINE wineboot
          git clone https://aur.archlinux.org/msvc-wine-git.git
          cd msvc-wine-git
          makepkg -si --noconfirm
          cd ..

          chmod +x third-party/common/linux/premake/premake5
          chmod +x third-party/deps/linux/7za/7za
          chmod +x third-party/deps/linux/cmake/bin/cmake

          ./third-party/common/linux/premake/premake5 --file=premake5-deps.lua --32-build --all-ext --all-build --custom-cmake=cmake --cmake-toolchain=$WINDOWS_SDK_PATH/cmake/toolchain-x86.cmake --custom-extractor=7z --j=$(nproc) --os=windows vs2026

          echo "BUILDING X64"

          export PATH=$WINDOWS_SDK_PATH/bin/x64:$PATH

          ./third-party/common/linux/premake/premake5 --file=premake5-deps.lua --64-build --all-ext --all-build --custom-cmake=cmake --cmake-toolchain=$WINDOWS_SDK_PATH/cmake/toolchain-x64.cmake --custom-extractor=7z --j=$(nproc) --os=windows vs2026

          ./third-party/common/linux/premake/premake5 --file=premake5.lua --genproto --os=windows vs2026 || true

          cd build/project/vs2026/win
          /opt/msvc/bin/x86/msbuild '/nologo' '/v:n' '/p:Configuration=release,Platform=Win32' gbe.slnx || echo "MSBuild x86 failed (exit $?)"

          echo "BUILDING X64"
          /opt/msvc/bin/x64/msbuild '/nologo' '/v:n' '/p:Configuration=release,Platform=x64' gbe.slnx || echo "MSBuild x64 failed (exit $?)"
          EOF

      - name: Upload artifact/s
        uses: actions/upload-artifact@v7
        with:
          name: emu-win-cross-release
          path: |
            build/win/vs2026/release/
